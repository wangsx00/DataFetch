name: Daily Douban Data Sync

on:
  schedule:
    # 每天北京时间 00:00 执行 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发执行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予提交代码的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Sync Script
        working-directory: ./tvDataFetch
        run: node douban_sync_hot.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tvDataFetch/douban_hot_json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update douban hot data"
            git push
          fi
